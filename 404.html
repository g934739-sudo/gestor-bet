<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GestorBet — Página não encontrada</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    body {
      font-family: 'Outfit', sans-serif;
      background: #09090f;
      color: #ededf5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
    }
    .code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 120px;
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, #f5c842, #e09920);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }
    h1 {
      font-size: 24px;
      font-weight: 900;
      color: #ededf5;
      margin-bottom: 12px;
    }
    p {
      font-size: 14px;
      color: #6a6a85;
      line-height: 1.7;
      max-width: 380px;
      margin-bottom: 36px;
    }
    .btn {
      display: inline-block;
      background: linear-gradient(135deg, #f5c842, #e09920);
      color: #111;
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      font-weight: 900;
      text-decoration: none;
      padding: 13px 32px;
      border-radius: 8px;
    }
    .btn:hover { filter: brightness(1.1); }
    .logo {
      position: fixed;
      top: 24px;
      left: 24px;
      font-size: 18px;
      font-weight: 900;
      text-decoration: none;
      color: #ededf5;
    }
    .logo span { color: #f0c040; }
  </style>
</head>
<body>
  <a href="site.html" class="logo">Gestor<span>Bet</span></a>
  <div class="code">404</div>
  <h1>Página não encontrada</h1>
  <p>A página que você está procurando não existe ou foi movida. Volte para o início e continue jogando com estratégia.</p>
  <a href="site.html" class="btn">🎰 Voltar para o início</a>
</body>
</html>
